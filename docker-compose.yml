  version: '3.8'

  services:
    mysql:
      image: mysql:8.0
      container_name: mysql-devops
      restart: unless-stopped
      environment:
        MYSQL_ROOT_PASSWORD: root_secret
        MYSQL_DATABASE: devops_db
        MYSQL_USER: devops_user
        MYSQL_PASSWORD: devops_pass
      volumes:
        - db_data:/var/lib/mysql
      ports:
        - "3306:3306"
      networks:
        - app-network
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
        interval: 10s
        timeout: 5s
        retries: 5

    backend:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: backend-devops
      restart: unless-stopped
      environment:
        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devops_db
        SPRING_DATASOURCE_USERNAME: devops_user
        SPRING_DATASOURCE_PASSWORD: devops_pass
      ports:
        - "8080:8080"
      depends_on:
        mysql:
          condition: service_healthy
      networks:
        - app-network

    frontend:
      image: nginx:alpine
      container_name: frontend-devops
      restart: unless-stopped
      volumes:
        - ./frontend:/usr/share/nginx/html:ro
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      ports:
        - "80:80"
      depends_on:
        - backend
      networks:
        - app-network


  volumes:
    db_data:
      driver: local

  networks:
    app-network:
      driver: bridge